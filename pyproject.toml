[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "sam-faces"
version = "0.1.0"
description = "Face recognition and people memory for AI assistants"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Sam Cox", email = "sam@jasonacox.com" }]
requires-python = ">=3.10"
dependencies = [
    "face_recognition>=1.3.0",
    "numpy>=1.24.0",
    "Pillow>=9.0.0",
]
keywords = ["face-recognition", "ai", "assistant", "people", "identity"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/jasonacox-sam/sam-faces"
